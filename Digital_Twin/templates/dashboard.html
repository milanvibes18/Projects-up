<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Digital Twin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        h2 { color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 8px; border: 1px solid #ccc; text-align: center; }
        th { background-color: #3498db; color: white; }
        tr.Low { background-color: #ffe6e6; }
        tr.High { background-color: #ffe6e6; }
        tr.Normal { background-color: #e6ffe6; }
        canvas { margin-top: 30px; }
        nav a { text-decoration: none; margin-right: 10px; }
    </style>
</head>
<body>
    <nav>
      <a href="/">🏠 Home</a> |
      <a href="/devices_view">📋 Devices</a> |
      <a href="/dashboard">📊 Dashboard</a>
    </nav>
    <hr>

    <h2>Digital Twin Dashboard</h2>

    <table id="dataTable">
        <tr>
            <th>Device</th>
            <th>Timestamp</th>
            <th>Value</th>
            <th>Status</th>
        </tr>
    </table>

    <canvas id="combinedChart"></canvas>

    <script>
        let combinedChart;

        async function fetchData() {
            const response = await fetch("/get_data");
            return response.json();
        }

        async function updateDashboard() {
            const data = await fetchData();

            const hrData = data["Heart Rate Sensor"] || [];
            const tempData = data["Temp Sensor"] || [];

            const labels = hrData.map(row => new Date(row.timestamp).toLocaleString()).reverse();
            const hrValues = hrData.map(row => row.value).reverse();
            const tempValues = tempData.map(row => row.value).reverse();

            // Update Table
            const table = document.getElementById("dataTable");
            table.innerHTML = `
                <tr>
                    <th>Device</th>
                    <th>Timestamp</th>
                    <th>Value</th>
                    <th>Status</th>
                </tr>
            `;

            Object.entries(data).forEach(([device, readings]) => {
                readings.forEach(row => {
                    let status = "Normal";
                    if (device === "Heart Rate Sensor") {
                        if (row.value < 50) status = "Low";
                        else if (row.value > 120) status = "High";
                    } else if (device === "Temp Sensor") {
                        if (row.value < 30) status = "Low";
                        else if (row.value > 35) status = "High";
                    }

                    const tr = document.createElement("tr");
                    tr.className = status;
                    tr.innerHTML = `
                        <td>${device}</td>
                        <td>${new Date(row.timestamp).toLocaleString()}</td>
                        <td>${row.value}</td>
                        <td>${status}</td>
                    `;
                    table.appendChild(tr);
                });
            });

            // Combined Dual-Axis Chart
            const ctx = document.getElementById("combinedChart").getContext("2d");
            if (!combinedChart) {
                combinedChart = new Chart(ctx, {
                    type: "line",
                    data: {
                        labels: labels,
                        datasets: [
                            {
                                label: "Heart Rate (BPM)",
                                data: hrValues,
                                borderColor: "blue",
                                backgroundColor: "rgba(0, 0, 255, 0.1)",
                                yAxisID: "y1",
                                tension: 0.3,
                                fill: true
                            },
                            {
                                label: "Temperature (°C)",
                                data: tempValues,
                                borderColor: "red",
                                backgroundColor: "rgba(255, 0, 0, 0.1)",
                                yAxisID: "y2",
                                tension: 0.3,
                                fill: true
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        interaction: {
                            mode: "index",
                            intersect: false
                        },
                        stacked: false,
                        scales: {
                            x: { title: { display: true, text: "Time" } },
                            y1: {
                                type: "linear",
                                position: "left",
                                title: { display: true, text: "BPM" },
                                beginAtZero: true
                            },
                            y2: {
                                type: "linear",
                                position: "right",
                                title: { display: true, text: "°C" },
                                beginAtZero: false,
                                grid: { drawOnChartArea: false }
                            }
                        }
                    }
                });
            } else {
                combinedChart.data.labels = labels;
                combinedChart.data.datasets[0].data = hrValues;
                combinedChart.data.datasets[1].data = tempValues;
                combinedChart.update();
            }
        }

        // Initial load + refresh every 5 sec
        updateDashboard();
        setInterval(updateDashboard, 5000);
    </script>
</body>
</html>
